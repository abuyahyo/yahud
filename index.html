<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>موسوعة اليهود واليهودية والصهيونية</title>
<meta name="description" content="موسوعة اليهود واليهودية والصهيونية — د. عبد الوهاب المسيري (سبعة مجلدات) — قارئ ويب مع بحثٍ كامل">
<meta name="theme-color" content="#1f3a5f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.png" sizes="48x48">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="الموسوعة">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --paper:#f4ecd8;--paper-deep:#ece0c4;--ink:#22282f;--ink-soft:#52617a;
    --accent:#1f3a5f;--accent-bright:#3a5d8a;--gold:#9a7b2e;--line:#cfbf95;
    --mark:#f0d878;--input-bg:#fbf5e6;--topbar-bg:rgba(244,236,216,.95);
    --card-bg:rgba(251,245,230,.78);--toc-ch-bg:rgba(236,224,196,.4);
    --accent-fg:#f7efdd;--sym-dim:#cbb88f;--shadow:rgba(43,33,24,.07);
    --line-soft:rgba(207,191,149,.5);--accent-soft:rgba(31,58,95,.1);
    --reader-scale:1;
  }
  body.dark{
    --paper:#1a1f26;--paper-deep:#242a33;--ink:#dcd0b8;--ink-soft:#8b94a3;
    --accent:#d4af6a;--accent-bright:#e8c890;--gold:#b8945f;--line:#3a4250;
    --mark:#7a6028;--input-bg:#1f252d;--topbar-bg:rgba(26,31,38,.95);
    --card-bg:rgba(36,42,51,.7);--toc-ch-bg:rgba(36,42,51,.5);
    --accent-fg:#1a1f26;--sym-dim:#4a5263;--shadow:rgba(0,0,0,.35);
    --line-soft:rgba(58,66,80,.6);--accent-soft:rgba(212,175,106,.18);
    color-scheme:dark;
  }
  html{font-size:clamp(15px,2.6vw,18px)}
  body{
    font-family:system-ui,-apple-system,"SF Arabic","Noto Sans Arabic","Segoe UI",Tahoma,sans-serif;
    color:var(--ink);direction:rtl;text-align:right;line-height:1.95;min-height:100vh;
    background-color:var(--paper);
    background-attachment:fixed;
    padding-bottom:80px;
    transition:background-color .25s ease,color .25s ease;
  }
  body:not(.dark){
    background-image:
      radial-gradient(circle at 18% 12%,rgba(255,255,255,.55),transparent 42%),
      radial-gradient(circle at 85% 88%,rgba(31,58,95,.07),transparent 45%);
  }
  body.dark{
    background-image:
      radial-gradient(circle at 18% 12%,rgba(212,175,106,.04),transparent 42%),
      radial-gradient(circle at 85% 88%,rgba(212,175,106,.03),transparent 45%);
  }
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;background:var(--topbar-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:10px clamp(12px,3vw,20px)}
  .topbar .btn{background:var(--paper-deep);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-family:"Amiri",serif;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;min-height:38px}
  .topbar .btn:active{transform:scale(.96)}
  .topbar .btn.icon{padding:8px 11px;min-width:42px;justify-content:center;font-weight:700}
  .topbar .crumb{flex:1;text-align:center;font-family:"Amiri",serif;color:var(--ink-soft);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px}
  .topbar .crumb b{color:var(--accent);font-weight:700}
  .settings-wrap{position:relative;display:flex}
  .settings-menu{position:absolute;top:calc(100% + 8px);left:0;background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:0 6px 22px var(--shadow);padding:6px;min-width:200px;z-index:40;display:none;flex-direction:column}
  .settings-menu.show{display:flex;animation:rise .18s ease both}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:8px 8px;font-family:"Amiri",serif;font-size:14px;color:var(--ink)}
  .set-row + .set-row{border-top:1px solid var(--line-soft)}
  .set-row .set-label{color:var(--ink-soft)}
  .set-row .set-ctrls{display:flex;gap:6px}

  /* Main */
  .wrap{max-width:820px;margin:0 auto;padding:clamp(14px,4vw,28px) clamp(14px,4vw,28px) 12px}
  header.site{text-align:center;padding:clamp(16px,4vw,32px) 8px clamp(14px,3vw,22px)}
  header.site h1{font-family:"Amiri","Scheherazade New",serif;font-weight:700;color:var(--accent);font-size:clamp(24px,6vw,40px);line-height:1.3}
  header.site .author{font-family:"Amiri",serif;color:var(--ink-soft);font-size:clamp(14px,3.6vw,18px);margin-top:8px}
  .divider{height:2px;width:min(420px,80%);margin:clamp(14px,3vw,22px) auto 0;background:linear-gradient(90deg,transparent,var(--line),transparent)}

  /* Page card */
  .page-card{background:var(--card-bg);border:1px solid var(--line);border-radius:16px;padding:clamp(18px,4.5vw,28px);margin-bottom:16px;box-shadow:0 2px 12px var(--shadow);animation:rise .3s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .page-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .page-head .chapter{font-family:"Amiri",serif;font-weight:700;color:var(--accent);font-size:clamp(16px,4vw,22px);flex:1;min-width:0}
  .page-head .pnum{font-family:"Amiri",serif;color:var(--gold);font-size:13px;white-space:nowrap}
  .page-body{font-size:calc(clamp(16px,4.4vw,20px)*var(--reader-scale));line-height:2.05;font-family:"Amiri","Scheherazade New",serif;color:var(--ink);white-space:pre-wrap;word-wrap:break-word}
  .page-body mark{background:var(--mark);color:inherit;border-radius:3px;padding:0 1px}

  /* Nav buttons */
  .pagenav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:18px 0 0;font-family:"Amiri",serif}
  .pagenav button{background:var(--paper-deep);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:10px 18px;font-family:inherit;font-size:16px;cursor:pointer;min-width:90px}
  .pagenav button:active{transform:scale(.96)}
  .pagenav button[disabled]{opacity:.4;cursor:default}
  .pagenav .jump{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft)}
  .pagenav .jump input{width:70px;text-align:center;padding:6px 4px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:15px;background:var(--input-bg);color:var(--ink)}

  /* Drawer (TOC) */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;bottom:0;right:0;width:min(380px,88vw);background:var(--paper);border-left:1px solid var(--line);z-index:46;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
  .drawer.show{transform:translateX(0)}
  .drawer-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-family:"Amiri",serif;background:var(--paper-deep)}
  .drawer-head h3{color:var(--accent);font-size:18px}
  .drawer-head .x{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:4px 10px}
  .drawer-tabs{display:flex;border-bottom:1px solid var(--line);background:var(--paper-deep)}
  .drawer-tab{flex:1;background:none;border:none;padding:12px 8px;font-family:"Amiri",serif;font-size:15px;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px}
  .drawer-tab.on{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}
  .drawer-tab .badge{background:var(--accent-soft);color:var(--accent);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:700;min-width:18px;text-align:center}
  .drawer-tab .badge:empty{display:none}
  .drawer-body{flex:1;overflow-y:auto;padding:8px 0}
  .hist-row{padding:10px 16px;font-family:"Amiri",serif;cursor:pointer;border-bottom:1px dashed var(--line-soft);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .hist-row:hover{background:var(--paper-deep)}
  .hist-row .meta{flex:1;min-width:0}
  .hist-row .ch{font-size:14px;color:var(--ink);line-height:1.45;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .hist-row .when{font-size:11px;color:var(--ink-soft);margin-top:3px}
  .hist-row .pn{color:var(--gold);font-size:12px;white-space:nowrap}
  .hist-row .del{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 6px;opacity:.6}
  .hist-row .del:hover{opacity:1;color:var(--accent-bright)}
  .hist-clear{display:block;margin:14px auto;padding:8px 20px;background:var(--paper-deep);border:1px solid var(--line);color:var(--ink-soft);border-radius:10px;font-family:"Amiri",serif;font-size:13px;cursor:pointer}
  .toc-vol{padding:10px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-family:"Amiri",serif;font-weight:700;color:var(--accent);font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .toc-vol:hover{background:var(--paper-deep)}
  .toc-vol .vnum{color:var(--gold);font-size:12px;font-weight:400}
  .toc-vol .arr{color:var(--ink-soft);font-size:13px;transition:transform .2s}
  .toc-vol.open .arr{transform:rotate(-90deg)}
  .toc-ch-list{display:none;background:var(--toc-ch-bg)}
  .toc-ch-list.show{display:block}
  .toc-ch{padding:9px 24px 9px 16px;font-family:"Amiri",serif;font-size:14px;color:var(--ink);cursor:pointer;border-bottom:1px dashed var(--line-soft);line-height:1.55;display:flex;justify-content:space-between;gap:8px}
  .toc-ch:hover{background:var(--paper-deep)}
  .toc-ch .pn{color:var(--gold);font-size:12px;white-space:nowrap}
  .toc-ch.cur{background:var(--accent-soft);font-weight:700}

  /* Search overlay */
  .search-overlay{position:fixed;inset:0;background:var(--paper);z-index:50;display:none;flex-direction:column}
  .search-overlay.show{display:flex}
  .search-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--paper-deep)}
  .search-head input{flex:1;font-family:"Amiri",serif;font-size:18px;font-weight:700;color:var(--ink);background:var(--input-bg);border:1.5px solid var(--line);border-radius:12px;padding:11px 16px;outline:none;text-align:right}
  .search-head input:focus{border-color:var(--accent-bright)}
  .search-head .x{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;padding:4px 12px}
  .search-meta{padding:10px 16px;font-family:"Amiri",serif;color:var(--ink-soft);font-size:13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .search-meta .progress{display:none;font-size:12px}
  .search-meta .progress.show{display:inline}
  .search-results{flex:1;overflow-y:auto;padding:8px 0}
  .hit{padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-family:"Amiri",serif}
  .hit:hover{background:var(--paper-deep)}
  .hit-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;font-size:13px;color:var(--ink-soft)}
  .hit-head b{color:var(--accent);font-weight:700}
  .hit-snip{font-size:15px;color:var(--ink);line-height:1.85;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hit-snip mark{background:var(--mark);color:inherit;border-radius:3px;padding:0 1px}

  .empty{text-align:center;color:var(--ink-soft);padding:56px 20px;font-family:"Amiri",serif}
  .empty .sym{font-size:54px;color:var(--sym-dim);display:block;margin-bottom:18px;line-height:1}
  .empty .msg{font-size:18px;line-height:1.6}

  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Install bar */
  .install-bar{position:fixed;left:12px;right:12px;bottom:12px;z-index:48;display:none;align-items:center;gap:10px;max-width:560px;margin:0 auto;background:var(--paper-deep);border:1px solid var(--line);border-radius:14px;padding:10px 14px;box-shadow:0 6px 22px var(--shadow);font-family:"Amiri",serif}
  .install-bar.show{display:flex}
  .install-bar .install-msg{flex:1;font-size:14px;color:var(--ink);line-height:1.7}
  .install-bar .install-do{flex:none;background:var(--accent);color:var(--accent-fg);border:none;border-radius:18px;padding:7px 16px;font-family:inherit;font-size:15px;cursor:pointer}
  .install-bar .install-x{flex:none;background:transparent;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;width:28px;height:28px}

  /* AI assistant (savol-javob) */
  .ai-overlay{position:fixed;inset:0;background:var(--paper);z-index:55;display:none;flex-direction:column;direction:ltr;text-align:left}
  .ai-overlay.show{display:flex}
  .ai-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;background:var(--paper-deep);font-family:"Amiri",serif}
  .ai-head h3{flex:1;color:var(--accent);font-size:18px;display:flex;align-items:baseline;gap:8px;min-width:0}
  .ai-head .ai-sub{font-size:11px;color:var(--ink-soft);font-weight:400;white-space:nowrap}
  .ai-head button{background:none;border:none;color:var(--ink-soft);font-size:20px;cursor:pointer;padding:4px 8px}
  .ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .ai-msg{display:flex}
  .ai-bubble{max-width:88%;padding:11px 14px;border-radius:14px;line-height:1.85;font-size:15px;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 1px 6px var(--shadow);text-align:start}
  .ai-msg.user .ai-bubble{margin-inline-start:auto;background:var(--accent);color:var(--accent-fg);border-bottom-left-radius:4px}
  .ai-msg.bot .ai-bubble{margin-inline-end:auto;background:var(--card-bg);border:1px solid var(--line);color:var(--ink);border-bottom-right-radius:4px}
  .ai-bubble .ai-cite{display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:6px;padding:0 6px;margin:0 2px;font-size:13px;cursor:pointer;font-family:"Amiri",serif;white-space:nowrap}
  .ai-bubble .ai-cite:active{transform:scale(.95)}
  .ai-sources{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line-soft)}
  .ai-src-label{font-size:11px;color:var(--ink-soft);font-family:"Amiri",serif;margin-bottom:6px}
  .ai-chips{display:flex;flex-wrap:wrap;gap:6px}
  .ai-chip{background:var(--paper-deep);border:1px solid var(--line);border-radius:10px;padding:4px 10px;font-size:12px;color:var(--ink-soft);cursor:pointer;font-family:"Amiri",serif;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ai-chip b{color:var(--gold);font-weight:700}
  .ai-chip:hover{background:var(--accent-soft);color:var(--accent)}
  .ai-basis{margin-top:10px}
  .ai-basis summary{cursor:pointer;font-family:"Amiri",serif;font-size:13px;color:var(--accent);list-style:none;padding:4px 0;user-select:none}
  .ai-basis summary::-webkit-details-marker{display:none}
  .ai-basis summary::before{content:"▾ ";color:var(--ink-soft)}
  .ai-basis[open] summary::before{content:"▴ "}
  .ai-basis-item{margin-top:8px;padding:9px 11px;background:var(--paper-deep);border:1px solid var(--line);border-radius:10px}
  .ai-basis-h{font-family:"Amiri",serif;font-size:12px;color:var(--ink-soft);margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ai-basis-h b{color:var(--accent);font-weight:700}
  .ai-basis-open{color:var(--accent-bright);cursor:pointer;font-size:12px}
  .ai-basis-open:active{transform:scale(.96)}
  .ai-basis-snip{font-family:"Amiri","Scheherazade New",serif;font-size:13px;line-height:1.85;color:var(--ink-soft);max-height:130px;overflow:auto;white-space:pre-wrap}
  .ai-typing{display:inline-flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:14px;font-family:"Amiri",serif}
  .ai-inrow{border-top:1px solid var(--line);background:var(--paper-deep);padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
  .ai-inrow textarea{flex:1;resize:none;max-height:120px;font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;color:var(--ink);background:var(--input-bg);border:1.5px solid var(--line);border-radius:14px;padding:9px 14px;outline:none;text-align:start}
  .ai-inrow textarea:focus{border-color:var(--accent-bright)}
  .ai-inrow .ai-send{flex:none;background:var(--accent);color:var(--accent-fg);border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ai-inrow .ai-send[disabled]{opacity:.4;cursor:default}
  .ai-setup{flex:1;overflow-y:auto;padding:28px 20px;font-family:"Amiri",serif;max-width:540px;margin:0 auto;width:100%}
  .ai-setup h4{color:var(--accent);font-size:20px;margin-bottom:12px}
  .ai-setup p{color:var(--ink-soft);font-size:14px;line-height:1.9;margin-bottom:14px}
  .ai-setup a{color:var(--accent-bright)}
  .ai-provrow{display:flex;gap:8px;margin-bottom:14px}
  .ai-prov{flex:1;background:var(--input-bg);border:1.5px solid var(--line);border-radius:12px;padding:10px;font-family:"Amiri",serif;font-size:15px;color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
  .ai-prov small{font-size:11px;color:var(--ink-soft)}
  .ai-prov.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700}
  .ai-prov.on small{color:var(--accent-bright)}
  .ai-setup input{width:100%;font-family:system-ui,monospace;font-size:14px;color:var(--ink);background:var(--input-bg);border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;outline:none;margin-bottom:12px;direction:ltr;text-align:left}
  .ai-setup .ai-save{background:var(--accent);color:var(--accent-fg);border:none;border-radius:12px;padding:11px 22px;font-family:"Amiri",serif;font-size:16px;cursor:pointer;width:100%}
  .ai-err{color:#c0392b;font-size:13px;margin-top:8px;line-height:1.7}
  body.dark .ai-err{color:#e88}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn icon" id="tocBtn" title="فهرس المجلدات">☰</button>
  <button class="btn icon" id="searchBtn" title="بحث">⌕</button>
  <button class="btn icon" id="aiBtn" title="AI yordamchi — o'zbek va arab tilida">✦</button>
  <div class="crumb" id="crumb">جارٍ التحميل…</div>
  <div class="settings-wrap">
    <button class="btn icon" id="settingsBtn" title="الإعدادات" aria-haspopup="true" aria-expanded="false">⚙</button>
    <div class="settings-menu" id="settingsMenu" role="menu">
      <div class="set-row">
        <span class="set-label">حجم الخطّ</span>
        <span class="set-ctrls">
          <button class="btn icon" id="decBtn" title="تصغير الخطّ">ا−</button>
          <button class="btn icon" id="incBtn" title="تكبير الخطّ">ا+</button>
        </span>
      </div>
      <div class="set-row">
        <span class="set-label">الوضع الليلي</span>
        <button class="btn icon" id="themeBtn" title="الوضع الليلي">🌙</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap" id="main">
  <header class="site" id="cover">
    <h1>موسوعة اليهود واليهودية والصهيونية</h1>
    <div class="author">للدكتور عبد الوهاب المسيري — سبعة مجلدات</div>
    <div class="divider"></div>
  </header>
  <div id="reader"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawerTitle">فهرس المجلدات</h3>

<script>
const META_URL = "meta.json";
const TASHKEEL = /[ً-ْٰـ]/g;
const AR = "٠١٢٣٤٥٦٧٨٩";
const arNum = n => String(n).replace(/[0-9]/g, d => AR[d]);
const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const normalize = s => (s||"").replace(TASHKEEL, "")
  .replace(/[أإآٱ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي")
  .replace(/ؤ/g, "و").replace(/ئ/g, "ي").toLowerCase();

let META = null;
const VOLS = {};           // n → vol JSON {volume,title,chapters,pages}
const PAGE_TO_VOL = [];    // p → volume index
let cur = { vol: 0, page: null };
let scale = parseFloat(localStorage.getItem("reader_scale") || "1") || 1;
const $ = s => document.querySelector(s);

/* Load meta + restore position */
async function init(){
  try{
    META = await (await fetch(META_URL)).json();
    META.volumes.forEach(v => { for(let p=v.start;p<=v.end;p++) PAGE_TO_VOL[p] = v.n; });
    buildTOC();
    applyScale();
    const saved = parseInt(localStorage.getItem("reader_page")||"0", 10);
    const hashP = (location.hash.match(/p=(\d+)/)||[])[1];
    const startP = hashP ? +hashP : (saved || 1);
    await goToPage(Math.max(1, Math.min(META.totalPages, startP)));
    // Boshqa jildlarni fonda yuklab, qidiruvni tezlashtirish
    setTimeout(prefetchAll, 600);
  }catch(e){
    $("#reader").innerHTML = '<div class="empty"><span class="sym">⚠</span><div class="msg">تعذّر تحميل البيانات</div></div>';
  }
}

const VOL_PROMISES = {};   // n → Promise (de-dup concurrent fetches)
function loadVol(n){
  if (VOLS[n]) return Promise.resolve(VOLS[n]);
  if (VOL_PROMISES[n]) return VOL_PROMISES[n];
  const v = META.volumes.find(x=>x.n===n);
  VOL_PROMISES[n] = fetch(v.file).then(r => r.json()).then(data => {
    // Pre-normalize text for fast search; computed once per page.
    for (const pg of data.pages) pg._n = normalize(pg.t);
    VOLS[n] = data;
    return data;
  });
  return VOL_PROMISES[n];
}

/* Background prefetch all volumes so search is instant after first use. */
function prefetchAll(){
  for (const v of META.volumes) loadVol(v.n);
}

/* TOC drawer */
function buildTOC(){
  const tb = $("#tocBody"); tb.innerHTML = "";
  META.volumes.forEach(v => {
    const vrow = document.createElement("div");
    vrow.className = "toc-vol";
    vrow.innerHTML = `<span><span class="vnum">[ج ${arNum(v.n)}]</span> ${esc(v.title)}</span><span class="arr">▾</span>`;
    const list = document.createElement("div");
    list.className = "toc-ch-list";
    list.dataset.vol = v.n;
    vrow.addEventListener("click", async () => {
      const open = vrow.classList.toggle("open");
      list.classList.toggle("show", open);
      if (open && !list.dataset.built) {
        const vol = await loadVol(v.n);
        list.innerHTML = vol.chapters.map((c,i) =>
          `<div class="toc-ch" data-vol="${v.n}" data-p="${c.start}"><span>${esc(c.title)}</span><span class="pn">ص ${arNum(c.start)}</span></div>`
        ).join("");
        list.dataset.built = "1";
        list.querySelectorAll(".toc-ch").forEach(el => {
          el.addEventListener("click", e => {
            e.stopPropagation();
            closeDrawer();
            goToPage(+el.dataset.p);
          });
        });
      }
    });
    tb.appendChild(vrow);
    tb.appendChild(list);
  });
}

/* Page rendering */
async function goToPage(p){
  const vn = PAGE_TO_VOL[p];
  if (vn === undefined) return;
  const vol = await loadVol(vn);
  const pg = vol.pages.find(x => x.p === p);
  if (!pg) return;
  cur = { vol: vn, page: p };
  localStorage.setItem("reader_page", String(p));
  history.replaceState(null, "", "#p=" + p);
  const ch = vol.chapters[pg.c];
  if (typeof pushHist === "function") pushHist(p, vol.title, ch.title);
  $("#crumb").innerHTML = `<b>${esc(vol.title)}</b> — ${esc(ch.title)}`;
  $("#cover").style.display = (p === 1) ? "" : "none";
  const body = pg.t ? esc(pg.t) : '<div class="empty"><span class="sym">∅</span><div class="msg">هذه الصفحة فارغة في المصدر (shamela.ws)</div></div>';
  $("#reader").innerHTML = `
    <article class="page-card">
      <div class="page-head"><div class="chapter">${esc(ch.title)}</div><div class="pnum">ص ${arNum(p)} / ${arNum(META.totalPages)}</div></div>
      <div class="page-body">${body}</div>
      <div class="pagenav">
        <button id="prevBtn" ${p<=1?"disabled":""}>السابقة ◄</button>
        <span class="jump">انتقال إلى:
          <input id="jumpInp" type="number" min="1" max="${META.totalPages}" value="${p}">
        </span>
        <button id="nextBtn" ${p>=META.totalPages?"disabled":""}>► التالية</button>
      </div>
    </article>`;
  $("#prevBtn").onclick = () => goToPage(p - 1);
  $("#nextBtn").onclick = () => goToPage(p + 1);
  $("#jumpInp").onchange = e => { const n = +e.target.value; if (n>=1 && n<=META.totalPages) goToPage(n); };
  // Update TOC highlight
  document.querySelectorAll(".toc-ch.cur").forEach(el => el.classList.remove("cur"));
  const cel = document.querySelector(`.toc-ch[data-vol="${vn}"][data-p="${ch.start}"]`);
  if (cel) cel.classList.add("cur");
  window.scrollTo({top:0, behavior:"instant"});
}

/* Keyboard nav */
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight") goToPage(cur.page + 1);   // RTL: → = next
  else if (e.key === "ArrowLeft") goToPage(cur.page - 1);
});

/* Swipe nav */
let touchX = null, touchY = null;
document.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, {passive:true});
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > 60 && Math.abs(dy) < 40) {
    if (dx > 0) goToPage(cur.page - 1);     // swipe → in RTL = previous (back)
    else goToPage(cur.page + 1);
  }
  touchX = null;
}, {passive:true});

/* Drawer */
function openDrawer(){ $("#drawer").classList.add("show"); $("#scrim").classList.add("show"); }
function closeDrawer(){ $("#drawer").classList.remove("show"); $("#scrim").classList.remove("show"); }
$("#tocBtn").onclick = openDrawer;
$("#drawerX").onclick = closeDrawer;
$("#scrim").onclick = closeDrawer;

/* Font size */
function applyScale(){ document.documentElement.style.setProperty("--reader-scale", scale); }
$("#incBtn").onclick = () => { scale = Math.min(scale + 0.1, 2.0); localStorage.setItem("reader_scale", scale.toFixed(2)); applyScale(); };
$("#decBtn").onclick = () => { scale = Math.max(scale - 0.1, 0.7); localStorage.setItem("reader_scale", scale.toFixed(2)); applyScale(); };

/* Dark mode */
function applyTheme(dark){
  document.body.classList.toggle("dark", dark);
  $("#themeBtn").textContent = dark ? "☀" : "🌙";
  $("#themeBtn").title = dark ? "الوضع النهاري" : "الوضع الليلي";
  document.querySelector('meta[name="theme-color"]').setAttribute("content", dark ? "#1a1f26" : "#1f3a5f");
}
(function initTheme(){
  const saved = localStorage.getItem("reader_theme");
  const dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(dark);
})();
$("#themeBtn").onclick = () => {
  const dark = !document.body.classList.contains("dark");
  localStorage.setItem("reader_theme", dark ? "dark" : "light");
  applyTheme(dark);
};

/* Settings menu (font size + theme tucked behind one button) */
const settingsBtn = $("#settingsBtn"), settingsMenu = $("#settingsMenu");
settingsBtn.onclick = e => {
  e.stopPropagation();
  const open = settingsMenu.classList.toggle("show");
  settingsBtn.setAttribute("aria-expanded", open ? "true" : "false");
};
document.addEventListener("click", e => {
  if (settingsMenu.classList.contains("show") && !e.target.closest(".settings-wrap")) {
    settingsMenu.classList.remove("show");
    settingsBtn.setAttribute("aria-expanded", "false");
  }
});

/* O'qish tarixi (eng yangi - boshda) */
const HIST_KEY = "reader_history", HIST_MAX = 30;
let HIST = JSON.parse(localStorage.getItem(HIST_KEY) || "[]");
function pushHist(p, volTitle, chTitle){
  HIST = HIST.filter(x => x.p !== p);            // duplicate o'chir
  HIST.unshift({ p, v: volTitle, c: chTitle, t: Date.now() });
  if (HIST.length > HIST_MAX) HIST.length = HIST_MAX;
  localStorage.setItem(HIST_KEY, JSON.stringify(HIST));
  updateHistBadge();
}
function updateHistBadge(){
  const b = $("#histBadge");
  if (b) b.textContent = HIST.length ? arNum(HIST.length) : "";
}
function fmtAgo(ms){
  const s = Math.max(1, Math.floor((Date.now() - ms) / 1000));
  if (s < 60) return "الآن";
  if (s < 3600) return arNum(Math.floor(s/60)) + " د";
  if (s < 86400) return arNum(Math.floor(s/3600)) + " س";
  return arNum(Math.floor(s/86400)) + " يومًا";
}
function renderHist(){
  const body = $("#histBody");
  if (!HIST.length) {
    body.innerHTML = '<div class="empty"><span class="sym">⌛</span><div class="msg">لم تفتح صفحاتٍ بعد</div></div>';
    return;
  }
  body.innerHTML = HIST.map((h, i) =>
    `<div class="hist-row" data-p="${h.p}"><div class="meta"><div class="ch">${esc(h.c)}</div><div class="when">${esc(h.v)} • ${fmtAgo(h.t)}</div></div><span class="pn">ص ${arNum(h.p)}</span><button class="del" data-i="${i}" aria-label="حذف">✕</button></div>`
  ).join("") + '<button class="hist-clear" id="histClear">مسح السجلّ</button>';
  body.querySelectorAll(".hist-row").forEach(el => {
    el.onclick = e => {
      if (e.target.classList.contains("del")) return;
      closeDrawer();
      goToPage(+el.dataset.p);
    };
  });
  body.querySelectorAll(".del").forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      HIST.splice(+b.dataset.i, 1);
      localStorage.setItem(HIST_KEY, JSON.stringify(HIST));
      updateHistBadge(); renderHist();
    };
  });
  const cb = $("#histClear");
  if (cb) cb.onclick = () => { HIST = []; localStorage.setItem(HIST_KEY, "[]"); updateHistBadge(); renderHist(); };
}

/* Drawer tabs */
document.querySelectorAll(".drawer-tab").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".drawer-tab").forEach(b => b.classList.toggle("on", b === btn));
    const pane = btn.dataset.pane;
    $("#tocBody").style.display = pane === "toc" ? "" : "none";
    $("#histBody").style.display = pane === "history" ? "" : "none";
    $("#drawerTitle").textContent = pane === "toc" ? "فهرس المجلدات" : "سجلّ القراءة";
    if (pane === "history") renderHist();
  };
});
updateHistBadge();

/* Search */
const SO = $("#searchOv"), SQ = $("#sq"), SC = $("#searchCount"), SP = $("#searchProg"), SR = $("#searchRes");
let searchToken = 0;
$("#searchBtn").onclick = () => { SO.classList.add("show"); SQ.focus(); };
$("#searchX").onclick = () => { SO.classList.remove("show"); };
SQ.addEventListener("input", () => { clearTimeout(SQ._t); SQ._t = setTimeout(runSearch, 250); });
SQ.addEventListener("keydown", e => { if (e.key === "Escape") SO.classList.remove("show"); });

function snippet(text, nq){
  const nt = normalize(text);
  const i = nt.indexOf(nq);
  if (i < 0) return esc(text.slice(0, 180));
  // Map normalized index back to original (approximate: same offset, since normalize is char→char)
  const start = Math.max(0, i - 60);
  const end = Math.min(text.length, i + nq.length + 100);
  const part = (start>0?"… ":"") + text.slice(start, end) + (end<text.length?" …":"");
  const re = new RegExp("(" + [...nq].map(c => c.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("[\\u064B-\\u0652\\u0670\\u0640]*") + ")", "i");
  return esc(part).replace(re, m => "<mark>" + m + "</mark>");
}

function searchVolSync(vol, vn, nq, hits, limit){
  for (const pg of vol.pages) {
    if (pg._n.indexOf(nq) >= 0) {
      const ch = vol.chapters[pg.c];
      hits.push({ vol: vn, ch: ch.title, p: pg.p, snip: snippet(pg.t, nq) });
      if (hits.length >= limit) return true;
    }
  }
  return false;
}

async function runSearch(){
  const q = SQ.value.trim();
  const nq = normalize(q);
  const token = ++searchToken;
  SR.innerHTML = ""; SC.textContent = ""; SP.classList.remove("show");
  if (nq.length < 2) return;
  const hits = [];
  const LIMIT = 200;
  // 1) Avval cache'dagi jildlardan darrov qidiramiz — natija lahzasiz chiqadi.
  for (const v of META.volumes) {
    if (VOLS[v.n] && searchVolSync(VOLS[v.n], v.n, nq, hits, LIMIT)) break;
  }
  renderHits(hits, q, nq);
  // 2) Yuklanmagan jildlarni parallel yuklab, ularda ham qidiramiz.
  const pending = META.volumes.filter(v => !VOLS[v.n]);
  if (pending.length && hits.length < LIMIT) {
    SP.classList.add("show");
    SP.textContent = `جارٍ تحميل ${arNum(pending.length)} مجلدًا…`;
    let doneCount = 0;
    await Promise.all(pending.map(v => loadVol(v.n).then(vol => {
      if (token !== searchToken) return;
      doneCount++;
      SP.textContent = `جارٍ تحميل ${arNum(pending.length - doneCount)} مجلدًا…`;
      if (hits.length < LIMIT) {
        searchVolSync(vol, v.n, nq, hits, LIMIT);
        renderHits(hits, q, nq);
      }
    })));
    SP.classList.remove("show");
  }
  if (token !== searchToken) return;
  if (!hits.length) {
    SR.innerHTML = '<div class="empty"><span class="sym">∅</span><div class="msg">لا توجد نتائج لـ «' + esc(q) + '»</div></div>';
    SC.textContent = "";
  }
}

function renderHits(hits, q, nq){
  hits.sort((a,b) => a.p - b.p);   // jild/sahifa tartibida
  SC.textContent = arNum(hits.length) + (hits.length >= 200 ? "+" : "") + " نتيجة";
  if (!hits.length) { SR.innerHTML = ""; return; }
  SR.innerHTML = hits.map(h =>
    `<div class="hit" data-p="${h.p}"><div class="hit-head"><b>${esc(h.ch)}</b><span>ج ${arNum(h.vol)} • ص ${arNum(h.p)}</span></div><div class="hit-snip">${h.snip}</div></div>`
  ).join("");
  SR.querySelectorAll(".hit").forEach(el => {
    el.onclick = () => { SO.classList.remove("show"); goToPage(+el.dataset.p); };
  });
}

    ${saved ? '<p style="color:var(--accent)">✓ Bu provayder uchun kalit saqlangan. Almashtirish uchun yangisini kiriting.</p>' : ''}
    <input id="aiKeyInput" type="password" placeholder="${cfg.hint}" autocomplete="off" spellcheck="false">
    <button class="ai-save" id="aiSaveKey">Saqlash va davom etish</button>
    ${saved ? '<button class="ai-save" id="aiClearKey" style="background:transparent;color:var(--ink-soft);border:1px solid var(--line);margin-top:10px">Saqlangan kalitni o\'chirish</button>' : ''}
    <div class="ai-err" id="aiSetupErr"></div>`;
  box.style.display = ""; $("#aiMsgs").style.display = "none"; $("#aiInrow").style.display = "none";
  box.querySelectorAll(".ai-prov").forEach(b => b.onclick = () => { localStorage.setItem(AI_PROV_LS, b.dataset.prov); aiShowSetup(); });
  $("#aiSaveKey").onclick = () => {
    const k = $("#aiKeyInput").value.trim();
    if (!k){ $("#aiSetupErr").textContent = "To'g'ri kalit kiriting."; return; }
    localStorage.setItem(aiCfg().keyLS, k);
    aiHideSetup(); aiWelcome(); $("#aiInput").focus();
  };
  const cl = $("#aiClearKey");
  if (cl) cl.onclick = () => { localStorage.removeItem(aiCfg().keyLS); aiShowSetup(); };
}
function aiHideSetup(){ $("#aiSetup").style.display = "none"; $("#aiMsgs").style.display = ""; $("#aiInrow").style.display = ""; }

function aiWelcome(){
  if (aiWelcomed) return;
  aiWelcomed = true;
  aiAddBot("Assalomu alaykum! Ensiklopediya matni asosida xulosa chiqaraman va nimaga asoslanganimni (manba sahifalarini) ko'rsataman. Savolni o'zbek yoki arab tilida yozing — javob ham o'sha tilda bo'ladi. Masalan: «Sionizm nima?» yoki «ما هي الصهيونية؟»");
}

function aiAddUser(text){
  const m = document.createElement("div"); m.className = "ai-msg user";
  m.innerHTML = '<div class="ai-bubble" dir="auto"></div>';
  m.querySelector(".ai-bubble").textContent = text;
  $("#aiMsgs").appendChild(m); aiScroll();
}
function aiAddBot(text){
  const m = document.createElement("div"); m.className = "ai-msg bot";
  m.innerHTML = '<div class="ai-bubble" dir="auto"></div>';
  m.querySelector(".ai-bubble").textContent = text;
  $("#aiMsgs").appendChild(m); aiScroll();
  return m.querySelector(".ai-bubble");
}
function aiScroll(){ const e = $("#aiMsgs"); e.scrollTop = e.scrollHeight; }

function aiFormat(text){
  let h = esc(text);
  h = h.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");   // **qalin** → <strong>
  h = h.replace(/^[ \t]*#{1,6}[ \t]*/gm, "");                    // # sarlavha belgilarini olib tashla
  h = h.replace(/^[ \t]*[*-][ \t]+/gm, "• ");                    // ro'yxat belgisi → •
  h = h.replace(/\[?\s*ص\.?\s*([0-9٠-٩]+)\s*\]?/g,
    (m, d) => `<span class="ai-cite" data-p="${aiToLatin(d)}">bet ${aiToLatin(d)}</span>`);
  return h;
}
function aiLinkify(bubble, text, sources){
  bubble.innerHTML = aiFormat(text);
  if (sources && sources.length){
    const wrap = document.createElement("div"); wrap.className = "ai-sources";
    const chips = sources.map(s => `<span class="ai-chip" data-p="${s.p}"><b>bet ${s.p}</b> · ${esc(s.ch)}</span>`).join("");
    const items = sources.map(s => {
      const snip = (s.t||"").replace(/\s+/g," ").trim().slice(0, 340);
      return `<div class="ai-basis-item"><div class="ai-basis-h"><b>bet ${s.p}</b> · ${esc(s.ch)} <span class="ai-basis-open" data-p="${s.p}">ochish ↗</span></div><div class="ai-basis-snip" dir="rtl">${esc(snip)}…</div></div>`;
    }).join("");
    wrap.innerHTML =
      `<div class="ai-src-label">Manbalar</div><div class="ai-chips">${chips}</div>` +
      `<details class="ai-basis"><summary>Nimaga asoslandim?</summary>${items}</details>`;
    bubble.appendChild(wrap);
  }
  bubble.querySelectorAll(".ai-cite,.ai-chip,.ai-basis-open").forEach(el => {
    el.onclick = e => { e.stopPropagation(); aiOv.classList.remove("show"); goToPage(+el.dataset.p); };
  });
}

/* --- Shared SSE reader --- */
async function aiReadSSE(res, onEvent){
  const reader = res.body.getReader(), dec = new TextDecoder();
  let buf = "";
  for(;;){
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream:true });
    let idx;
    while((idx = buf.indexOf("\n")) >= 0){
      const line = buf.slice(0, idx).trim(); buf = buf.slice(idx + 1);
      if (!line.startsWith("data:")) continue;
      const payload = line.slice(5).trim();
      if (!payload || payload === "[DONE]") continue;
      let ev; try{ ev = JSON.parse(payload); }catch(_){ continue; }
      onEvent(ev);
    }
  }
}
function aiRetryable(status, msg){
  return status === 429 || status === 500 || status === 502 || status === 503 ||
    /high demand|overload|unavailable|temporarily|try again|rate.?limit/i.test(msg || "");
}
const aiSleep = ms => new Promise(r => setTimeout(r, ms));
const aiBackoff = i => Math.round(1200 * Math.pow(2, i) * (0.85 + Math.random() * 0.3));
async function aiFetchRetry(url, opts, tries = 3){
  let last;
  for (let i = 0; i < tries; i++){
    let res;
    try{ res = await fetch(url, opts); }
    catch(e){ last = e; if (i < tries - 1){ await aiSleep(aiBackoff(i)); continue; } throw e; }
    if (res.ok) return res;
    let msg = "Xatolik (" + res.status + ")";
    try{ const e = await res.clone().json(); if (e && e.error && e.error.message) msg = e.error.message; }catch(_){}
    const err = new Error(msg); err.status = res.status;
    if (i < tries - 1 && aiRetryable(res.status, msg)){ last = err; await aiSleep(aiBackoff(i)); continue; }
    throw err;
  }
  throw last || new Error("Xatolik");
}

/* --- Claude (Anthropic) adapter --- */
function aiClaudeHeaders(){
  return { "content-type":"application/json", "x-api-key": aiKey(),
           "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" };
}
async function aiClaudeComplete(system, user){
  const res = await aiFetchRetry("https://api.anthropic.com/v1/messages", { method:"POST", headers: aiClaudeHeaders(),
    body: JSON.stringify({ model: aiCfg().models[0], max_tokens: 1024, thinking:{type:"disabled"}, system, messages:[{role:"user", content:user}] }) });
  const data = await res.json();
  return (data.content||[]).filter(b => b.type === "text").map(b => b.text).join("");
}
async function aiClaudeStream(system, user, onDelta){
  const res = await aiFetchRetry("https://api.anthropic.com/v1/messages", { method:"POST", headers: aiClaudeHeaders(),
    body: JSON.stringify({ model: aiCfg().models[0], max_tokens: 4096, stream:true, thinking:{type:"adaptive"}, output_config:{effort:"medium"}, system, messages:[{role:"user", content:user}] }) });
  await aiReadSSE(res, ev => { if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") onDelta(ev.delta.text); });
}

/* --- Gemini (Google) adapter --- */
async function aiGeminiFetch(method, extra, body){
  const models = aiCfg().models;
  let lastErr;
  for (let mi = 0; mi < models.length; mi++){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${models[mi]}:${method}?key=${encodeURIComponent(aiKey())}${extra}`;
    try{
      return await aiFetchRetry(url, { method:"POST", headers:{ "content-type":"application/json" }, body: JSON.stringify(body) });
    }catch(e){
      lastErr = e;
      if (mi < models.length - 1 && aiRetryable(e.status, e.message)) continue;  // band — zaxira modelга o't
      throw e;
    }
  }
  throw lastErr;
}
async function aiGeminiComplete(system, user){
  const res = await aiGeminiFetch("generateContent", "", { system_instruction:{ parts:[{ text: system }] },
    contents:[{ role:"user", parts:[{ text: user }] }], generationConfig:{ maxOutputTokens: 1024, responseMimeType:"application/json" } });
  const data = await res.json();
  const c = (data.candidates||[])[0];
  return (((c && c.content && c.content.parts) || []).map(p => p.text || "").join(""));
}
async function aiGeminiStream(system, user, onDelta){
  const res = await aiGeminiFetch("streamGenerateContent", "&alt=sse", { system_instruction:{ parts:[{ text: system }] },
    contents:[{ role:"user", parts:[{ text: user }] }], generationConfig:{ maxOutputTokens: 4096 } });
  await aiReadSSE(res, ev => {
    const parts = ((((ev.candidates||[])[0]||{}).content)||{}).parts || [];
    for (const p of parts) if (p.text) onDelta(p.text);
  });
}

function aiComplete(system, user){ return aiProvider() === "claude" ? aiClaudeComplete(system, user) : aiGeminiComplete(system, user); }
function aiStreamAnswer(system, user, onDelta){ return aiProvider() === "claude" ? aiClaudeStream(system, user, onDelta) : aiGeminiStream(system, user, onDelta); }

/* --- Retrieval-augmented flow --- */
function aiParseList(txt){
  if (!txt) return [];
  try{ const o = JSON.parse(txt); if (Array.isArray(o)) return o.filter(x => typeof x === "string"); if (o && Array.isArray(o.keywords)) return o.keywords; }catch(_){}
  const m = txt.match(/\[[\s\S]*\]/);
  if (m){ try{ const a = JSON.parse(m[0]); if (Array.isArray(a)) return a.filter(x => typeof x === "string"); }catch(_){} }
  return [];
}
async function aiExtract(question){
  const sys = "Foydalanuvchi savolidan «موسوعة اليهود واليهودية والصهيونية» (د. عبد الوهاب المسيري) ensiklopediyasida izlash uchun arabcha kalit so'zlar chiqar. Savol mazmunini arab tiliga o'girib, 3-8 ta arabcha atama va sinonim ber. FAQAT arabcha so'zlardan iborat JSON massiv qaytar, masalan: [\"الصهيونية\",\"اليهود\"]. Boshqa hech narsa yozma.";
  return aiParseList(await aiComplete(sys, question));
}
async function aiRetrieve(keywords){
  await Promise.all(META.volumes.map(v => loadVol(v.n)));
  const nqs = keywords.map(normalize).filter(x => x && x.length >= 2);
  if (!nqs.length) return [];
  const hits = [];
  for (const v of META.volumes){
    const vol = VOLS[v.n]; if (!vol) continue;
    for (const pg of vol.pages){
      if (!pg._n) continue;
      let score = 0;
      for (const nq of nqs) if (pg._n.indexOf(nq) >= 0) score++;
      if (score) hits.push({ score, p: pg.p, vol: v.n, ch: vol.chapters[pg.c].title, t: pg.t });
    }
  }
  hits.sort((a,b) => b.score - a.score || a.p - b.p);
  return hits.slice(0, 6);
}
async function aiAnswer(question, pages, onDelta){
  let ctx = pages.map(p => `[ص ${arNum(p.p)} — ${p.ch}]\n${(p.t||"").slice(0,1800)}`).join("\n\n———\n\n");
  if (!ctx) ctx = "(لا توجد صفحات مطابقة في الموسوعة)";
  await aiStreamAnswer(AI_SYS, `Savol: ${question}\n\nEnsiklopediyadan tegishli sahifalar:\n\n${ctx}`, onDelta);
}

async function aiAsk(){
  if (aiBusy) return;
  const inp = $("#aiInput"), q = inp.value.trim();
  if (!q) return;
  if (!aiKey()){ aiShowSetup(); return; }
  inp.value = ""; inp.style.height = "auto";
  aiBusy = true; $("#aiSend").disabled = true;
  aiAddUser(q);
  const bubble = aiAddBot("");
  bubble.setAttribute("dir", /[؀-ۿ]/.test(q) ? "rtl" : "ltr");   // javob yo'nalishi savol tiliga qarab
  bubble.innerHTML = '<span class="ai-typing"><span class="spinner"></span> o\'ylayapti…</span>';
  try{
    const keywords = await aiExtract(q);
    const pages = await aiRetrieve(keywords);
    let acc = "", first = true;
    await aiAnswer(q, pages, d => {
      if (first){ bubble.textContent = ""; first = false; }
      acc += d; bubble.textContent = acc; aiScroll();
    });
    if (!acc.trim()) acc = "Kechirasiz, javob ololmadim. Qayta urinib ko'ring.";
    aiLinkify(bubble, acc, pages); aiScroll();
  }catch(err){
    let m = err.message || "Xatolik yuz berdi.";
    if (err.status === 401 || err.status === 403) m = "API kaliti noto'g'ri yoki ruxsat yo'q. ⚙ orqali tekshiring.";
    else if (err.status === 400 && /key|api[_\s-]?key|invalid/i.test(m)) m = "API kaliti noto'g'ri ko'rinadi. ⚙ orqali tekshiring.";
    else if (err.status === 503 || err.status === 500 || err.status === 502 || /high demand|overload|unavailable|temporarily/i.test(m))
      m = "Xizmat hozir band (yuqori talab). Bir-ikki daqiqadan so'ng qayta urinib ko'ring, yoki ⚙ orqali Claude'ni tanlang.";
    else if (err.status === 429) m = "So'rovlar limiti oshib ketdi. Birozdan so'ng urinib ko'ring.";
    bubble.innerHTML = '<span class="ai-err"></span>';
    bubble.querySelector(".ai-err").textContent = m;
  }finally{
    aiBusy = false; $("#aiSend").disabled = false;
  }
}

const aiInput = $("#aiInput");
$("#aiSend").onclick = aiAsk;
aiInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); aiAsk(); } });
aiInput.addEventListener("input", () => { aiInput.style.height = "auto"; aiInput.style.height = Math.min(aiInput.scrollHeight, 120) + "px"; });

init();
</script>
